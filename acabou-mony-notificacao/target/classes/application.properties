spring.application.name=acabou-mony-notificacao
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/db_acabou_mony?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

sendgrid.api-key=
sendgrid.from-email=bilopesortega@gmail.com

spring.mvc.converters.preferred-json-mapper=jackson
