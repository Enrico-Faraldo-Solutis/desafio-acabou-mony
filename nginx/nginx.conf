worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ---------------------------------------------------------------
    # Upstreams — Round Robin (padrão do NGINX, sem diretiva extra)
    # Nomes dos servidores = nomes dos containers no Docker Compose
    # Para rodar fora do Docker, troque pelo localhost:porta correspondente
    # ---------------------------------------------------------------
    upstream auth_upstream {
        server acabou-mony-auth:8081;
    }

    upstream account_upstream {
        server acabou-mony-account:8082;
    }

    upstream card_upstream {
        server acabou-mony-card:8083;
    }

    upstream transaction_upstream {
        server acabou-mony-transaction:8084;
    }

    upstream auditing_upstream {
        server acabou-mony-auditing:8085;
    }

    upstream notificacao_upstream {
        server acabou-mony-notificacao:8086;
    }

    server {
        listen 80;

        # ---------------------------------------------------------------
        # Roteamento por path — cada location aponta para seu microsserviço
        # ---------------------------------------------------------------

        location /api/auth/ {
            proxy_pass http://auth_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/accounts/ {
            proxy_pass http://account_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/cards/ {
            proxy_pass http://card_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/transactions/ {
            proxy_pass http://transaction_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auditing/ {
            proxy_pass http://auditing_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/notificacoes/ {
            proxy_pass http://notificacao_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}